name: Update packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'akr release tag (e.g., 1.3.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      KEYNAME: support@akamai.com
      RELEASE_TAG: ${{ inputs.release_tag }}
      UBUNTU_VERSIONS: '22 24 26'
      RHEL_VERSIONS: '8 9 10'
      CENTOS_VERSIONS: '9 10'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils dpkg-dev createrepo-c gnupg

      - name: Import GPG signing key
        env:
          PACKAGE_PRIVATE_KEY: ${{ secrets.PACKAGE_PRIVATE_KEY }}
        run: |
          echo "$PACKAGE_PRIVATE_KEY" | base64 -d | gpg --batch --import

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          for v in $UBUNTU_VERSIONS; do
            mkdir -p "ubuntu/$v"
            rm -f "ubuntu/$v"/*.deb
            gh release download "$RELEASE_TAG" --repo akamai/akr \
              --pattern "akr_${RELEASE_TAG}_ubuntu${v}_amd64.deb" --dir "ubuntu/$v"
          done
          for v in $RHEL_VERSIONS; do
            mkdir -p "rhel/$v"
            rm -f "rhel/$v"/*.rpm
            gh release download "$RELEASE_TAG" --repo akamai/akr \
              --pattern "akr_${RELEASE_TAG}_rhel${v}_x86_64.rpm" --dir "rhel/$v"
          done
          for v in $CENTOS_VERSIONS; do
            mkdir -p "centos/$v"
            rm -f "centos/$v"/*.rpm
            gh release download "$RELEASE_TAG" --repo akamai/akr \
              --pattern "akr_${RELEASE_TAG}_centos${v}_x86_64.rpm" --dir "centos/$v"
          done

      - name: Regenerate Debian metadata
        run: |
          set -e
          for v in $UBUNTU_VERSIONS; do
            pushd "ubuntu/$v" >/dev/null
            dpkg-scanpackages --multiversion . > Packages
            gzip -k -f Packages
            apt-ftparchive release . > Release
            gpg --batch --yes --default-key "$KEYNAME" -abs -o Release.gpg Release
            rm -f InRelease
            gpg --batch --yes --default-key "$KEYNAME" --clearsign -o InRelease Release
            popd >/dev/null
          done

      - name: Regenerate RPM metadata
        run: |
          set -e
          for v in $RHEL_VERSIONS; do createrepo_c --update "rhel/$v"; done
          for v in $CENTOS_VERSIONS; do createrepo_c --update "centos/$v"; done

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: ${{ inputs.release_tag }}
          title: ${{ inputs.release_tag }}
          branch: release/${{ inputs.release_tag }}
          base: main
          body: ''
